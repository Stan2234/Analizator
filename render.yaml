services:
  - type: web
    name: analizator
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run macro_agent_app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    autoDeploy: true
    healthCheckPath: /
    disk:
      name: analizator-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANALIZATOR_DB_PATH
        value: /data/analizator.db
      - key: APP_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
